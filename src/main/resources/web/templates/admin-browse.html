<div class="breadcrumb">{{breadcrumb}}</div>
<div class="toolbar">
    <button onclick="showUploadModal()" class="btn primary">upload</button>
    <button onclick="showMkdirModal()" class="btn">folder</button>
</div>
<div class="file-list admin-list">
    {{#hasParent}}
    <div class="file-item parent directory">
        <a href="{{parentUrl}}">
            <span class="name">..</span>
        </a>
    </div>
    {{/hasParent}}
    {{#entries}}
    <div class="file-item {{class}}">
        <a href="{{href}}">
            <span class="name">{{name}}</span>
        </a>
        {{#showSize}}<span class="size">{{size}}</span>{{/showSize}}
        {{#showDate}}<span class="date">{{date}}</span>{{/showDate}}
        <div class="actions">
            <button onclick="renameItem('{{path}}')" title="rename">[rename]</button>
            <button onclick="deleteItem('{{path}}')" title="delete" class="danger">[delete]</button>
        </div>
    </div>
    {{/entries}}
    {{#empty}}
    <div class="empty">empty directory</div>
    {{/empty}}
</div>

<!-- upload modal thingy -->
<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>upload files</h2>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="hidden" name="path" value="{{currentPath}}">
            <div id="dropZone" class="drop-zone">
                <p>drop files or click to select</p>
                <input type="file" name="files" id="fileInput" multiple>
            </div>
            <div id="fileList" class="file-preview"></div>
            <div class="modal-actions">
                <button type="button" onclick="closeModal('uploadModal')" class="btn">cancel</button>
                <button type="submit" class="btn primary">upload</button>
            </div>
        </form>
    </div>
</div>

<!-- mkdir modal -->
<div id="mkdirModal" class="modal">
    <div class="modal-content">
        <h2>new folder</h2>
        <form id="mkdirForm">
            <input type="text" name="name" placeholder="folder name" required>
            <div class="modal-actions">
                <button type="button" onclick="closeModal('mkdirModal')" class="btn">cancel</button>
                <button type="submit" class="btn primary">create</button>
            </div>
        </form>
    </div>
</div>
